<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity Manager Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(30, 41, 59, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    aside {
      width: 280px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
    }

    #fileList {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .entity-item {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entity-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .entity-item.active {
      background: rgba(56, 189, 248, 0.1);
      border-left: 3px solid var(--accent);
    }

    .entity-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 10px;
    }

    .entity-version {
      font-size: 0.7rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
    }

    main {
       flex: 1;
       display: flex;
       flex-direction: column;
       overflow: hidden;
    }

    header {
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1.5rem;
      align-items: center;
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(8px);
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    #contentArea {
       flex: 1;
       overflow-y: auto;
       padding: 2rem 5% 4rem;
       display: none;
    }

    #indexArea {
       flex: 1;
       overflow-y: auto;
       padding: 2rem;
    }

    .metadata-block {
      background: #0d1117;
      padding: 1.25rem;
      border-radius: 8px;
      margin-bottom: 2rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      border: 1px solid var(--border);
      color: #9cdcfe;
      box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.5);
    }

    .markdown-body {
       line-height: 1.7;
       color: #e2e8f0;
    }

    .markdown-body h1 {
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.3em;
      margin-bottom: 1em;
      color: var(--accent);
    }

    .markdown-body h2 {
      margin-top: 2rem;
      color: #cbd5e1;
    }

    .markdown-body blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-style: italic;
    }

    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 0.75rem;
      text-align: left;
    }

    .markdown-body th {
      background: rgba(255, 255, 255, 0.05);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .markdown-body tr:hover {
       background: rgba(255, 255, 255, 0.02);
    }
  </style>
</head>
<body>
  <aside>
    <div class="sidebar-header">
      <h1>Entities Manager</h1>
    </div>
    <div id="fileList"></div>
  </aside>

  <main>
    <header>
      <button id="showIndex" class="btn active">Master Index</button>
      <button id="refreshBtn" class="btn">Manual Refresh</button>
      <div style="flex: 1"></div>
      <div id="statusIndicator" style="font-size: 0.8rem; color: var(--muted)">Ready</div>
    </header>
    
    <div id="indexArea" class="markdown-body"></div>

    <div id="contentArea" class="markdown-body">
       <div id="yamlView" class="metadata-block"></div>
       <div id="markdownView"></div>
    </div>
  </main>

  <script>
    let activeEntity = null;

    async function loadEntities() {
      const res = await fetch('/api/entities');
      const entities = await res.json();
      const list = document.getElementById('fileList');
      list.innerHTML = '';
      
      entities.sort((a,b) => a.path.localeCompare(b.path));
      
      entities.forEach(entity => {
        const item = document.createElement('div');
        item.className = 'entity-item' + (activeEntity === entity.path ? ' active' : '');
        item.innerHTML = `
          <span class="entity-name">${entity.name}</span>
          <span class="entity-version">${entity.version}</span>
        `;
        item.onclick = () => viewEntity(entity.path);
        list.appendChild(item);
      });
    }

    async function loadIndex() {
      const res = await fetch('/api/index');
      const data = await res.json();
      document.getElementById('indexArea').innerHTML = data.html;
      document.getElementById('showIndex').classList.add('active');
      document.getElementById('indexArea').style.display = 'block';
      document.getElementById('contentArea').style.display = 'none';
      activeEntity = null;
      loadEntities();
    }

    async function viewEntity(path) {
      document.getElementById('statusIndicator').innerText = `Loading ${path}...`;
      const res = await fetch('/api/view/' + path);
      if (!res.ok) return;

      const data = await res.json();
      activeEntity = path;
      
      document.getElementById('yamlView').innerText = data.yaml;
      document.getElementById('markdownView').innerHTML = data.html;
      
      document.getElementById('showIndex').classList.remove('active');
      document.getElementById('indexArea').style.display = 'none';
      document.getElementById('contentArea').style.display = 'block';
      
      document.getElementById('statusIndicator').innerText = `Viewing: ${path}`;
      loadEntities();
    }

    document.getElementById('showIndex').onclick = loadIndex;
    document.getElementById('refreshBtn').onclick = () => {
      loadEntities();
      if (!activeEntity) loadIndex();
      else viewEntity(activeEntity);
    };

    loadIndex();
    setInterval(() => {
       if (!activeEntity) loadIndex();
    }, 10000);
  </script>
</body>
</html>
